name: CI-CD

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE != '' && vars.K8S_NAMESPACE || 'devops-demo' }}
  IMAGE_NAME: ${{ vars.DOCKER_IMAGE != '' && vars.DOCKER_IMAGE || format('{0}/devops-demo-api', secrets.DOCKERHUB_USERNAME) }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Tests
        run: |
          pytest --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Upload coverage.xml
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: SonarQube Scan (optional)
        if: ${{ secrets.SONAR_HOST_URL != '' && secrets.SONAR_TOKEN != '' }}
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Quality Gate (optional)
        if: ${{ vars.ENFORCE_QUALITY_GATE == 'true' && secrets.SONAR_HOST_URL != '' && secrets.SONAR_TOKEN != '' }}
        uses: sonarsource/sonarqube-quality-gate-action@v1.1.0
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Trivy FS scan (optional fail)
        uses: aquasecurity/trivy-action@0.22.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: ${{ vars.TRIVY_FAIL == 'true' && '1' || '0' }}

  build_push:
    needs: [test]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

      - name: Trivy image scan (optional fail)
        uses: aquasecurity/trivy-action@0.22.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: ${{ vars.TRIVY_FAIL == 'true' && '1' || '0' }}

  deploy:
    needs: [build_push]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.KUBECONFIG_DATA != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Write kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${KUBECONFIG_DATA}" | base64 -d > ~/.kube/config
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/00-namespace.yaml
          kubectl apply -f k8s/10-deployment.yaml
          kubectl apply -f k8s/20-service.yaml
          if kubectl get crd servicemonitors.monitoring.coreos.com >/dev/null 2>&1; then
            kubectl apply -f k8s/30-servicemonitor.yaml
          fi

      - name: Rolling update image
        run: |
          kubectl -n "${K8S_NAMESPACE}" set image deployment/devops-demo-api devops-demo-api="${IMAGE_NAME}:${IMAGE_TAG}"
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/devops-demo-api --timeout=180s
        env:
          IMAGE_TAG: ${{ needs.build_push.outputs.image_tag }}
