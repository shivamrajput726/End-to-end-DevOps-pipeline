apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: devops-demo-api
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: devops-demo-api
  namespaceSelector:
    any: true
  endpoints:
    - port: http
      path: /metrics
      interval: 15s

