apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-demo-api
  labels:
    app: devops-demo-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-demo-api
  template:
    metadata:
      labels:
        app: devops-demo-api
    spec:
      containers:
        - name: devops-demo-api
          image: YOUR_DOCKERHUB_USER/devops-demo-api:latest
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20

